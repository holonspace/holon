events {}

http {
    server {
        listen 443 ssl;
        server_name holon.gg;

        ssl_certificate     /etc/nginx/certs/_wildcard.holon.gg+1.pem;
        ssl_certificate_key /etc/nginx/certs/_wildcard.holon.gg+1-key.pem;

        location / {
            proxy_pass http://host.docker.internal:3000;
            proxy_http_version 1.1;
            # WebSocket 支援（Vite HMR）
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 3600s;
        }
    }

    server {
        listen 443 ssl;
        server_name auth.holon.gg;

        ssl_certificate     /etc/nginx/certs/_wildcard.holon.gg+1.pem;
        ssl_certificate_key /etc/nginx/certs/_wildcard.holon.gg+1-key.pem;

        location / {
            proxy_pass http://host.docker.internal:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 3600s;
        }
    }

    server {
        listen 443 ssl;
        server_name api.holon.gg;

        ssl_certificate     /etc/nginx/certs/_wildcard.holon.gg+1.pem;
        ssl_certificate_key /etc/nginx/certs/_wildcard.holon.gg+1-key.pem;

        location / {
            proxy_pass http://host.docker.internal:8787;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
        }
    }
}
